name: Core — Build, Sign & Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    # Nightly dev pre-build at 22:00 UTC so artifacts + manifests
    # are signed and on R2 by 00:00 UTC (rove-dev auto-update window).
    - cron: "0 22 * * *"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Resolve channel + detect script changes ─────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.filter.outputs.scripts }}
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scripts:
              - 'scripts/install.sh'
              - 'scripts/install.ps1'
              - 'scripts/uninstall.sh'
              - 'scripts/uninstall.ps1'

      # Tag push → stable, everything else → dev.
      - name: Resolve release channel
        id: channel
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          fi

  # ── Format ──────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Lint & Test ──────────────────────────────────
  check:
    name: Check (${{ matrix.platform }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            platform: Linux
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: Windows
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        shell: bash

      - name: Test
        run: cargo test --workspace
        shell: bash

  # ── Build engine ─────────────────────────────────
  build-engine:
    name: Build Engine (${{ needs.changes.outputs.channel }} · ${{ matrix.platform }})
    needs: [changes]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            engine_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-aarch64
            engine_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            engine_ext: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ needs.changes.outputs.channel }}

      # Dev builds enable `channel-dev` feature → engine baked as Dev channel,
      # uses $HOME/.rove-dev, runs auto_update at UTC 00:00.
      # Stable tag builds drop the feature → Stable channel, $HOME/.rove,
      # manual `rove update` only.
      - name: Build engine (release)
        run: scripts/release/build-release.sh
        shell: bash
        env:
          ROVE_CHANNEL: ${{ needs.changes.outputs.channel }}
          TARGET: ${{ matrix.target }}
          ROVE_TEAM_OFFICIAL_PUBLIC_KEY: ${{ secrets.ROVE_TEAM_OFFICIAL_PUBLIC_KEY }}
          ROVE_TEAM_COMMUNITY_PUBLIC_KEY: ${{ secrets.ROVE_TEAM_COMMUNITY_PUBLIC_KEY }}

      - name: Stage engine artifact
        run: |
          mkdir -p artifacts/engine
          cp target/release-builds/rove-*${{ matrix.engine_ext }} \
             artifacts/engine/rove-${{ matrix.target }}${{ matrix.engine_ext }} 2>/dev/null || \
          cp target/${{ matrix.target }}/release/rove${{ matrix.engine_ext }} \
             artifacts/engine/rove-${{ matrix.target }}${{ matrix.engine_ext }} 2>/dev/null || true
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: engine-${{ needs.changes.outputs.channel }}-${{ matrix.platform }}
          path: artifacts/
          retention-days: 1

  # ── Build core tools ─────────────────────────────
  build-tools:
    name: Build Tools (${{ needs.changes.outputs.channel }} · ${{ matrix.platform }})
    needs: [changes]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            lib_ext: so
            lib_prefix: lib
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-aarch64
            lib_ext: dylib
            lib_prefix: lib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            lib_ext: dll
            lib_prefix: ""

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ needs.changes.outputs.channel }}

      - name: Build core tools (release)
        run: |
          for tool in app-launcher file-watcher notification voice-native; do
            cargo build --release --target ${{ matrix.target }} -p $tool || true
          done
        shell: bash

      - name: Stage tool artifacts
        run: |
          mkdir -p artifacts/core_tools/${{ matrix.platform }}
          for tool in app_launcher file_watcher notification voice_native; do
            SRC="target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}${tool}.${{ matrix.lib_ext }}"
            [ -f "$SRC" ] && cp "$SRC" artifacts/core_tools/${{ matrix.platform }}/
          done
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: tools-${{ needs.changes.outputs.channel }}-${{ matrix.platform }}
          path: artifacts/
          retention-days: 1

  # ── Sign & Deploy to R2 ─────────────────────────
  deploy:
    name: Sign & Deploy (${{ needs.changes.outputs.channel }})
    needs: [changes, build-engine, build-tools]
    if: always() && (needs.build-engine.result == 'success' || needs.build-engine.result == 'failure') && needs.build-tools.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Install b3sum
        run: |
          sudo apt-get update && sudo apt-get install -y b3sum || \
            cargo install b3sum

      - name: Hash all artifacts
        run: |
          find artifacts/ -type f | while read f; do
            b3sum "$f" 2>/dev/null || sha256sum "$f"
          done | tee artifacts/checksums.txt

      - name: Prepare R2 layout (per-channel)
        env:
          CHANNEL: ${{ needs.changes.outputs.channel }}
        run: |
          mkdir -p .r2_upload
          ENGINE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          if [ -d "artifacts/engine" ]; then
            mkdir -p ".r2_upload/${CHANNEL}/engine/${ENGINE_VERSION}"
            cp artifacts/engine/* ".r2_upload/${CHANNEL}/engine/${ENGINE_VERSION}/" 2>/dev/null || true
          fi

          if [ -d "artifacts/core_tools" ]; then
            mkdir -p ".r2_upload/${CHANNEL}/core-tools/${ENGINE_VERSION}"
            cp -r artifacts/core_tools/* ".r2_upload/${CHANNEL}/core-tools/${ENGINE_VERSION}/" 2>/dev/null || true
          fi

          find .r2_upload -type f | sort

      - name: Deploy artifacts to registry R2 (rove-registry)
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.REGISTRY_R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: "auto"
          AWS_S3_ENDPOINT: ${{ secrets.R2_API_URL }}
          SOURCE_DIR: ".r2_upload"

      # Install scripts are channel-agnostic: only uploaded when the files change.
      - name: Stage install scripts
        if: needs.changes.outputs.scripts == 'true'
        run: |
          mkdir -p .r2_get
          cp scripts/install.sh .r2_get/install.sh 2>/dev/null || true
          cp scripts/install.ps1 .r2_get/install.ps1 2>/dev/null || true
          cp scripts/uninstall.sh .r2_get/uninstall.sh 2>/dev/null || true
          cp scripts/uninstall.ps1 .r2_get/uninstall.ps1 2>/dev/null || true
          find .r2_get -type f | sort
        shell: bash

      - name: Deploy install scripts to get R2 (rove-get)
        if: needs.changes.outputs.scripts == 'true'
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.GET_R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: "auto"
          AWS_S3_ENDPOINT: ${{ secrets.R2_API_URL }}
          SOURCE_DIR: ".r2_get"

      - name: Stage assets (logo + static media)
        run: |
          mkdir -p .r2_assets
          cp assets/logo/Demo_logo.png .r2_assets/logo.png 2>/dev/null || true
          find .r2_assets -type f | sort
        shell: bash

      - name: Deploy assets to assets R2 (rove-assets)
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.ASSETS_R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: "auto"
          AWS_S3_ENDPOINT: ${{ secrets.R2_API_URL }}
          SOURCE_DIR: ".r2_assets"

      - name: GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/engine/*
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update Registry (per-channel manifests) ─────
  update-registry:
    name: Update Registry (${{ needs.changes.outputs.channel }})
    needs: [changes, build-engine, build-tools]
    if: always() && (needs.build-engine.result == 'success' || needs.build-engine.result == 'failure') && needs.build-tools.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Install b3sum
        run: sudo apt-get update && sudo apt-get install -y b3sum openssl || cargo install b3sum

      - name: Update per-channel manifests
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
          CHANNEL: ${{ needs.changes.outputs.channel }}
          OFFICIAL_KEY_HEX: ${{ secrets.ROVE_TEAM_OFFICIAL_PRIVATE_KEY }}
        run: |
          set -e
          git clone https://x-access-token:${REGISTRY_PAT}@github.com/rovehq/registry.git /tmp/registry

          ENGINE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          COMMIT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          R2_BASE="https://registry.roveai.co"
          GH_RAW="https://raw.githubusercontent.com/rovehq/registry/main"

          python3 scripts/release/sign-manifest.py --make-pem-only

          sign_manifest() { python3 scripts/release/sign-manifest.py "$1"; }

          # ══════════════════ ENGINE ══════════════════
          if [ -d "artifacts/engine" ]; then
            mkdir -p "/tmp/registry/${CHANNEL}/engine"
            MANIFEST="/tmp/registry/${CHANNEL}/engine/manifest.json"
            if [ ! -f "$MANIFEST" ]; then
              jq -n --arg ch "$CHANNEL" --arg ts "$TIMESTAMP" '{
                schema_version: 2,
                channel: $ch,
                artifact: "engine",
                issuer: "rove-team",
                published_at: $ts,
                entries: { latest: { version: "", platforms: {} } },
                signature: ""
              }' > "$MANIFEST"
            fi

            for bin in artifacts/engine/rove-*; do
              [ ! -f "$bin" ] && continue
              HASH=$(b3sum "$bin" | cut -d' ' -f1)
              SIZE=$(stat --format=%s "$bin" 2>/dev/null || stat -f%z "$bin" 2>/dev/null)
              FILENAME=$(basename "$bin")

              case "$FILENAME" in
                *aarch64-apple-darwin*) PLATFORM="darwin-aarch64" ;;
                *x86_64-apple-darwin*)  PLATFORM="darwin-x86_64" ;;
                *aarch64-unknown-linux*) PLATFORM="linux-aarch64" ;;
                *x86_64-unknown-linux*)  PLATFORM="linux-x86_64" ;;
                *x86_64-pc-windows*)     PLATFORM="windows-x86_64" ;;
                *aarch64-pc-windows*)    PLATFORM="windows-aarch64" ;;
                *) continue ;;
              esac

              REL_DIR="${CHANNEL}/engine/${ENGINE_VERSION}"
              mkdir -p "/tmp/registry/${REL_DIR}"
              cp "$bin" "/tmp/registry/${REL_DIR}/${FILENAME}"

              jq --arg ver "$ENGINE_VERSION" \
                 --arg plat "$PLATFORM" \
                 --arg url "$R2_BASE/$REL_DIR/$FILENAME" \
                 --arg fallback "$GH_RAW/$REL_DIR/$FILENAME" \
                 --arg b3 "$HASH" \
                 --argjson sz "${SIZE:-0}" \
                 '.entries.latest.version = $ver |
                  .entries.latest.platforms[$plat] = {
                    url: $url,
                    fallback_url: $fallback,
                    blake3: $b3,
                    size_bytes: $sz
                  }' \
                 "$MANIFEST" > /tmp/m.json && mv /tmp/m.json "$MANIFEST"
            done

            jq --arg ts "$TIMESTAMP" '.published_at = $ts' "$MANIFEST" > /tmp/m.json && mv /tmp/m.json "$MANIFEST"
            sign_manifest "$MANIFEST"
          fi

          # ══════════════════ CORE-TOOLS ══════════════════
          if [ -d "artifacts/core_tools" ]; then
            mkdir -p "/tmp/registry/${CHANNEL}/core-tools"
            TMANIFEST="/tmp/registry/${CHANNEL}/core-tools/manifest.json"
            if [ ! -f "$TMANIFEST" ]; then
              jq -n --arg ch "$CHANNEL" --arg ts "$TIMESTAMP" --arg min "$ENGINE_VERSION" '{
                schema_version: 2,
                channel: $ch,
                artifact: "core-tools",
                issuer: "rove-team",
                published_at: $ts,
                min_engine: $min,
                entries: {},
                signature: ""
              }' > "$TMANIFEST"
            fi

            for platform_dir in artifacts/core_tools/*/; do
              [ ! -d "$platform_dir" ] && continue
              PLATFORM=$(basename "$platform_dir")
              REL_DIR="${CHANNEL}/core-tools/${ENGINE_VERSION}/${PLATFORM}"
              mkdir -p "/tmp/registry/${REL_DIR}"

              for lib in "$platform_dir"*; do
                [ ! -f "$lib" ] && continue
                HASH=$(b3sum "$lib" | cut -d' ' -f1)
                SIZE=$(stat --format=%s "$lib" 2>/dev/null || stat -f%z "$lib" 2>/dev/null)
                FILENAME=$(basename "$lib")
                TOOL_NAME=$(echo "$FILENAME" | sed 's/^lib//' | sed 's/\..*//' | tr '_' '-')

                cp "$lib" "/tmp/registry/${REL_DIR}/${FILENAME}"

                jq --arg tool "$TOOL_NAME" \
                   --arg ver "$ENGINE_VERSION" \
                   --arg plat "$PLATFORM" \
                   --arg url "$R2_BASE/$REL_DIR/$FILENAME" \
                   --arg fallback "$GH_RAW/$REL_DIR/$FILENAME" \
                   --arg b3 "$HASH" \
                   --argjson sz "${SIZE:-0}" \
                   '.entries[$tool] = (.entries[$tool] // {version: $ver, trust_tier: 0, platforms: {}}) |
                    .entries[$tool].version = $ver |
                    .entries[$tool].trust_tier = 0 |
                    .entries[$tool].platforms[$plat] = {
                      url: $url, fallback_url: $fallback, blake3: $b3, size_bytes: $sz
                    }' \
                   "$TMANIFEST" > /tmp/m.json && mv /tmp/m.json "$TMANIFEST"
              done
            done

            jq --arg ts "$TIMESTAMP" '.published_at = $ts' "$TMANIFEST" > /tmp/m.json && mv /tmp/m.json "$TMANIFEST"
            sign_manifest "$TMANIFEST"
          fi

          cd /tmp/registry
          git config user.name "rove-ci"
          git config user.email "ci@roveai.co"
          git add -A
          if git diff --cached --quiet; then
            echo "No manifest changes."
          else
            git commit -m "release(${CHANNEL}): engine v${ENGINE_VERSION} (${COMMIT})"
            git push
          fi

      - name: Upload manifests + sigs to R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --exclude "*" --include "*/engine/manifest*" --include "*/core-tools/manifest*"
        env:
          AWS_S3_BUCKET: ${{ secrets.REGISTRY_R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: "auto"
          AWS_S3_ENDPOINT: ${{ secrets.R2_API_URL }}
          SOURCE_DIR: "/tmp/registry"
